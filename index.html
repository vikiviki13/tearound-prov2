<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeaRound" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d14" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%2300c896'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='300' fill='%230a0a14'%3E☕%3C/text%3E%3C/svg%3E" />
  <title>TeaRound Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      max-width: 100%
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      overflow-x: hidden
    }

    body {
      height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      overflow-x: hidden;
      background: #0d0d14;
      -webkit-font-smoothing: antialiased
    }

    input,
    button,
    textarea,
    select {
      font-family: inherit
    }

    button {
      cursor: pointer;
      border: none;
      background: none
    }

    input,
    textarea {
      border: none;
      outline: none
    }

    img {
      max-width: 100%;
      display: block
    }

    :root {
      --bg: #0d0d14;
      --surface: #141420;
      --surface2: #1a1a2e;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #f0f0ff;
      --text2: #8888aa;
      --text3: #44445a;
      --accent: #00c896;
      --accent-dim: #00c89618;
      --accent-text: #00c896;
      --danger: #ff4466;
      --danger-dim: #ff446618;
      --warn: #f59e0b;
      --shadow: 0 4px 24px #00000055;
      --shadow-md: 0 8px 40px #00000055;
      --shadow-accent: 0 8px 40px #00c89630;
      --nav-bg: #0d0d14ee;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --sidebar-w: 256px;
      --topbar-h: 64px;
      --bnav-h: 64px;
    }

    [data-theme="light"] {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #f0f0ea;
      --border: #e2e2da;
      --border2: #d0d0c8;
      --text: #1a1a2e;
      --text2: #55557a;
      --text3: #aaaacc;
      --accent: #00a87a;
      --accent-dim: #00a87a15;
      --accent-text: #007a58;
      --danger: #e02050;
      --danger-dim: #e0205015;
      --warn: #d97706;
      --shadow: 0 2px 12px #0000000d;
      --shadow-md: 0 4px 24px #0000000a;
      --shadow-accent: 0 8px 32px #00a87a25;
      --nav-bg: #fffffff0
    }

    [data-theme="warm"] {
      --bg: #1a1208;
      --surface: #231a0a;
      --surface2: #2e2010;
      --border: #ffffff0a;
      --border2: #ffffff15;
      --text: #f5e6c8;
      --text2: #9a7a50;
      --text3: #5a4030;
      --accent: #f0a030;
      --accent-dim: #f0a03018;
      --accent-text: #f0a030;
      --danger: #e05030;
      --danger-dim: #e0503018;
      --warn: #f0a030;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #f0a03030;
      --nav-bg: #1a1208ee
    }

    [data-theme="neon"] {
      --bg: #020208;
      --surface: #06060f;
      --surface2: #0a0a18;
      --border: #00ffcc08;
      --border2: #00ffcc15;
      --text: #d0d0ff;
      --text2: #5050aa;
      --text3: #2a2a5a;
      --accent: #00ffcc;
      --accent-dim: #00ffcc10;
      --accent-text: #00ffcc;
      --danger: #ff0066;
      --danger-dim: #ff006615;
      --warn: #ffaa00;
      --shadow: 0 8px 60px #00000088;
      --shadow-md: 0 8px 60px #00000088;
      --shadow-accent: 0 0 40px #00ffcc20;
      --nav-bg: #020208f0
    }

    [data-theme="ocean"] {
      --bg: #040d1a;
      --surface: #071428;
      --surface2: #0c1e38;
      --border: #1e4a7808;
      --border2: #1e4a7818;
      --text: #c8e4ff;
      --text2: #5880a8;
      --text3: #2a4060;
      --accent: #38b2ff;
      --accent-dim: #38b2ff18;
      --accent-text: #38b2ff;
      --danger: #ff5a7a;
      --danger-dim: #ff5a7a18;
      --warn: #ffa040;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #38b2ff25;
      --nav-bg: #040d1aee
    }

    [data-theme="rose"] {
      --bg: #120810;
      --surface: #1c0e18;
      --surface2: #261422;
      --border: #ff4a8808;
      --border2: #ff4a8818;
      --text: #ffd6ee;
      --text2: #a06080;
      --text3: #603050;
      --accent: #ff6eb4;
      --accent-dim: #ff6eb418;
      --accent-text: #ff6eb4;
      --danger: #ff4040;
      --danger-dim: #ff404018;
      --warn: #ffaa40;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #ff6eb430;
      --nav-bg: #120810ee
    }

    [data-theme="forest"] {
      --bg: #080e08;
      --surface: #0e160e;
      --surface2: #141e14;
      --border: #2a5a2a08;
      --border2: #2a5a2a18;
      --text: #d0ead0;
      --text2: #5a8a5a;
      --text3: #2a4a2a;
      --accent: #4dbb6d;
      --accent-dim: #4dbb6d18;
      --accent-text: #4dbb6d;
      --danger: #e05050;
      --danger-dim: #e0505018;
      --warn: #d4a030;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #4dbb6d30;
      --nav-bg: #080e08ee
    }

    #app {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      overflow-x: hidden;
      width: 100%
    }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform .3s cubic-bezier(.4, 0, .2, 1)
    }

    #sidebar .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      margin-bottom: 32px
    }

    #sidebar .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    #sidebar .logo-text {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.3px
    }

    #sidebar .logo-sub {
      font-size: 10px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em
    }

    #sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1
    }

    #sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--text2);
      font-weight: 600;
      font-size: 14px;
      transition: all .2s ease;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer
    }

    #sidebar .nav-item:hover {
      background: var(--accent-dim);
      color: var(--accent);
      transform: translateX(2px)
    }

    #sidebar .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent)
    }

    #sidebar .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .8;
      transition: all .2s ease
    }

    #sidebar .nav-item.active svg {
      opacity: 1;
      filter: drop-shadow(0 0 4px var(--accent))
    }

    #sidebar .sidebar-footer {
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    /* Main */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: calc(100vw - var(--sidebar-w))
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px)
    }

    #topbar h1 {
      font-family: 'Fraunces', serif;
      font-size: 19px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.2px
    }

    #content {
      padding: 24px 28px;
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box
    }

    /* Bottom nav */
    #bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
      justify-content: space-around;
      height: calc(var(--bnav-h) + env(safe-area-inset-bottom, 0px))
    }

    #bottom-nav .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      border-radius: 12px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: none;
      border: none;
      cursor: pointer;
      transition: all .2s ease;
      min-width: 56px
    }

    #bottom-nav .bnav-item svg {
      width: 22px;
      height: 22px;
      transition: all .2s ease
    }

    #bottom-nav .bnav-item.active {
      color: var(--accent);
      transform: scale(1.1) translateY(-1px);
      background: var(--accent-dim)
    }

    #bottom-nav .bnav-item.active svg {
      filter: drop-shadow(0 0 8px var(--accent));
      transform: scale(1.05)
    }

    #bottom-nav .bnav-item:active {
      transform: scale(.93)
    }

    @media(max-width:1023px) {
      #sidebar {
        display: none
      }

      #main {
        margin-left: 0;
        max-width: 100vw
      }

      #bottom-nav {
        display: flex
      }

      #content {
        padding: 16px 16px calc(16px + var(--bnav-h) + env(safe-area-inset-bottom, 0px))
      }

      #topbar {
        padding: 0 16px;
        height: 56px
      }

      #topbar h1 {
        font-size: 17px
      }
    }

    @media(max-width:480px) {
      #content {
        padding: 12px 12px calc(12px + var(--bnav-h) + env(safe-area-inset-bottom, 0px))
      }

      #topbar {
        padding: 0 12px
      }

      .flex-between {
        flex-wrap: wrap;
        gap: 8px
      }

      .session-header-actions {
        flex-direction: column;
        width: 100%
      }

      .session-header-actions .btn {
        width: 100%;
        justify-content: center
      }

      .card,
      .card-sm,
      .form-section,
      .profile-hero {
        padding: 14px
      }

      .modal-box {
        padding: 20px 16px
      }

      .modal-sheet-box {
        padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px))
      }
    }

    /* Components */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .28);
      border-color: var(--border2)
    }

    .card-sm {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color .2s ease
    }

    .card-sm:hover {
      border-color: var(--border2)
    }

    .inp {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      height: 48px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      outline: none;
      background: var(--surface)
    }

    .inp:hover:not(:focus) {
      border-color: var(--border2)
    }

    .inp::placeholder {
      color: var(--text3)
    }

    .inp[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield
    }

    .inp[type="number"]::-webkit-inner-spin-button,
    .inp[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none
    }

    select.inp {
      cursor: pointer
    }

    textarea.inp {
      height: auto;
      padding: 12px 16px;
      resize: vertical;
      min-height: 80px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      height: 44px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      letter-spacing: .02em;
      transition: all .2s ease;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a14;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 24px var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-primary:active {
      transform: scale(.97) translateY(0);
      filter: brightness(.98)
    }

    .btn-dark {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border2)
    }

    .btn-dark:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-dark:active {
      transform: scale(.97) translateY(0)
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1.5px solid var(--danger)
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--danger-dim)
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
      transform: none !important
    }

    .btn-sm {
      height: 36px;
      padding: 0 14px;
      font-size: 13px;
      border-radius: 10px
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      flex-shrink: 0;
      transition: all .2s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-icon:active {
      transform: scale(.93) translateY(0)
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .tag-green {
      background: var(--accent-dim);
      color: var(--accent-text)
    }

    .tag-red {
      background: var(--danger-dim);
      color: var(--danger)
    }

    .tag-muted {
      background: var(--surface2);
      color: var(--text2)
    }

    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px
    }

    .section-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      margin-bottom: 18px
    }

    .avatar {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0
    }

    .flex {
      display: flex;
      align-items: center
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .gap-6 {
      gap: 6px
    }

    .gap-8 {
      gap: 8px
    }

    .gap-10 {
      gap: 10px
    }

    .gap-12 {
      gap: 12px
    }

    .gap-16 {
      gap: 16px
    }

    .stack {
      display: flex;
      flex-direction: column
    }

    .stack-8 {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .stack-12 {
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .stack-16 {
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .stack-20 {
      display: flex;
      flex-direction: column;
      gap: 20px
    }

    .w-full {
      width: 100%
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px
    }

    @media(max-width:480px) {
      .grid-2 {
        grid-template-columns: 1fr
      }

      .grid-3 {
        grid-template-columns: 1fr 1fr
      }
    }

    .text-accent {
      color: var(--accent)
    }

    .text-muted {
      color: var(--text2)
    }

    .text-sm {
      font-size: 13px
    }

    .text-xs {
      font-size: 11px
    }

    .text-lg {
      font-size: 18px
    }

    .font-bold {
      font-weight: 700
    }

    .font-black {
      font-weight: 800
    }

    .font-fraunces {
      font-family: 'Fraunces', serif
    }

    .upper {
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(.85);
        opacity: 0
      }

      70% {
        transform: scale(1.05)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

          const [users, shops, sessions, orders] = await Promise.all([
            db.from('users').select('*'),

          }, { onConflict: 'id' });

          return true;
        } catch (e) { console.error('upsertShop exception:', e); return false; }
      },

      async deleteShop(id) {
        const db = getDB(); if (!db) return true;
        try {
          const { error } = await db.from('shops').delete().eq('id', id);
          if (error) { console.error('deleteShop error:', error); toast(error.message || 'Failed to delete shop', 'error'); return false; }
          return true;
        } catch (e) { console.error('deleteShop exception:', e); return false; }
      },

      async upsertSession(s) {
        const db = getDB(); if (!db) return true;
        try {
          // Ensure creator + shop exist
          const creator = state.users.find(u => u.id === s.creatorId);
          if (creator) await this.upsertUser(creator);
          const shop = state.shops.find(sh => sh.id === s.shopId);
          if (shop) await this.upsertShop(shop);
          const { error } = await db.from('sessions').upsert({
            id: s.id, shop_id: s.shopId, creator_id: s.creatorId,
            location: s.location, locked: s.locked || false, closed: s.closed || false
          }, { onConflict: 'id' });
          if (error) { console.error('upsertSession error:', error); toast(error.message || 'Failed to save session', 'error'); return false; }
          return true;
        } catch (e) { console.error('upsertSession exception:', e); return false; }

      async upsertOrder(o) {
        const db = getDB(); if (!db) return true;
        try {
          if (!o.sessionId || !o.userId) { toast('Invalid order data', 'error'); return false; }
          // Ensure full FK chain: user → shop → session → order
          const user = state.users.find(u => u.id === o.userId);
          if (user) await this.upsertUser(user);
          const session = state.sessions.find(s => s.id === o.sessionId);
          if (session) await this.upsertSession(session);
          const { error } = await db.from('orders').upsert({
            id: o.id, session_id: o.sessionId, user_id: o.userId,
            user_name: o.userName, item_id: o.itemId, item_name: o.itemName,
            price: o.price, quantity: o.quantity, note: o.note || ''
          }, { onConflict: 'id' });

          return true;
        } catch (e) { console.error('upsertOrder exception:', e); return false; }
      },

    function loadFromLocalStorage() {
      const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
      state.shops = g(SK.SHOPS, '[]');
      state.sessions = g(SK.SESSIONS, '[]');
      state.orders = g(SK.ORDERS, '[]');
      state.users = g(SK.USERS, '[]');

    async function load() {
      try {
        const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
        state.theme = localStorage.getItem(SK.THEME) || 'dark';
        const auth = g(SK.AUTH, 'null');
        if (auth) { state.user = auth; state.view = 'home'; }
        const savedSession = localStorage.getItem('activeSession');
        if (savedSession && state.user) state.activeSessionId = savedSession;
        applyTheme(state.theme);
        render(); // immediate render from localStorage
        const usedDB = await DB.loadAll();
        if (!usedDB) {
          loadFromLocalStorage();
        } else {
          // Re-sync logged-in user from DB so profile/theme/avatar always fresh
          if (state.user) {
            const dbUser = state.users.find(u => u.id === state.user.id);
            if (dbUser) {
              state.user = { ...dbUser };
              applyTheme(dbUser.theme || 'dark');
              state.theme = dbUser.theme || 'dark';
            }
          }
          localStorage.setItem(SK.AUTH, JSON.stringify(state.user));
          setupRealtime();
        }
        render();
      } catch (e) {
        console.error('Boot load failed:', e);
        loadFromLocalStorage();
        render();
      }
    }

    function setupRealtime() {
      const db = getDB(); if (!db) return;
      ['orders', 'sessions', 'shops', 'users'].forEach(table => {
        db.channel(`rt-${table}`)
          .on('postgres_changes', { event: '*', schema: 'public', table }, async () => {
            await DB.loadAll();
            // Re-sync user too
            if (state.user) {
              const dbUser = state.users.find(u => u.id === state.user.id);
              if (dbUser) state.user = { ...dbUser };
            }
            render();
          })
          .subscribe();
      });
    }

    function applyTheme(name) {
      const t = THEMES[name] || THEMES.dark;
      const r = document.documentElement.style;
      Object.entries(t).forEach(([k, v]) => { if (k !== 'name') r.setProperty('--' + k, v); });
      if (name === 'dark') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', name);
    }

      el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span>${msg}`;
      c.appendChild(el);

    // ─── AUTH ─────────────────────────────────────────────────────────────────────
    function handleAuth(username, password, isReg) {
      const uRaw = username.trim(); // PRESERVE original casing (FIX: "Viki" stays "Viki")
      const uLower = uRaw.toLowerCase();
      const p = password;
      if (!uRaw || !p) { state._authError = 'Please fill in all fields'; save(); render(); return; }
      if (p.length < 3) { state._authError = 'Password must be at least 3 characters'; save(); render(); return; }

      if (isReg) {
        if (state.users.find(x => (x.username || '').toLowerCase() === uLower)) {
          state._authError = 'Username already taken — try another'; save(); render(); return;
        }
        const nu = {
          id: gid(),
          username: uLower,          // stored lowercase for index
          display_name: uRaw,        // FIX: preserve original casing
          password: p,
          role: state.users.length === 0 ? 'admin' : 'user',
          joined: new Date().toLocaleDateString('en-IN'),
          avatarColor: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
          bio: '', theme: 'dark', avatarUrl: null
        };
        state.users.push(nu);
        state.user = nu;
        state.theme = 'dark';
        applyTheme('dark');
        save();
        setState({ view: 'home', _loginName: '', _loginPass: '', _showPass: false, _authError: null, _loginReg: false });
        toast('Account created! Welcome 🎉');
        // Async: save to DB after UI is shown
        DB.upsertUser(nu).then(ok => {
          if (ok) { DB.loadAll().then(() => render()); }
        });
      } else {
        const found = state.users.find(x => (x.username || '').toLowerCase() === uLower && x.password === p);
        if (!found) { state._authError = 'Invalid username or password'; save(); render(); return; }
        // FIX: restore display_name with original casing
        state.user = { ...found, display_name: found.display_name || found.username };
        const userTheme = found.theme || 'dark';
        state.theme = userTheme;
        applyTheme(userTheme);
        toast(`Welcome back, ${found.display_name || found.username}!`);
        setState({ view: 'home', _loginName: '', _loginPass: '', _showPass: false, _authError: null, _loginReg: false });
      }
    }

    // ─── EXPORT / DOWNLOAD SUMMARY ────────────────────────────────────────────────
    function exportShop(shop) {
      if (!shop) { toast('Shop not found', 'error'); return; }
      if (!shop.menu || shop.menu.length === 0) { toast('Menu is empty', 'error'); return; }
      const data = JSON.stringify({ name: shop.name, address: shop.address, menu: shop.menu.map(({ name, price, emoji }) => ({ name, price, emoji })) }, null, 2);
      navigator.clipboard.writeText(data).then(() => toast(`${shop.name} JSON copied ✅`)).catch(() => { });
      try {
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `TeaRound_${shop.name.replace(/\s+/g, '_')}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      } catch (e) { console.warn('File download failed', e); }
    }

    async function importShop(json) {
      try {
        const data = JSON.parse(json);
        if (!data.name || !Array.isArray(data.menu)) throw new Error('Invalid');
        const s = { id: gid(), name: data.name, address: data.address || 'Imported', menu: data.menu.map(m => ({ ...m, id: gid() })), creatorId: state.user.id };
        state.shops.push(s);
        setState({ modal: null });
        toast(`Imported ${s.name}!`);
        await DB.upsertShop(s);
        await DB.loadAll(); render();
      } catch { toast('Invalid JSON format', 'error'); }
    }

      try {
        const session = getSession(), shop = getSessionShop(), so = getSessionOrders();
        if (!session) { toast('No active session', 'error'); return; }
        if (so.length === 0) { toast('No orders to export', 'error'); return; }

        const agg = Object.entries(so.reduce((a, o) => { a[o.itemName] = (a[o.itemName] || 0) + o.quantity; return a; }, {}));
        const totalItems = so.reduce((a, o) => a + o.quantity, 0);
        const totalPrice = so.reduce((a, o) => a + o.price * o.quantity, 0);
        const dateStr = new Date().toLocaleString('en-IN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });

        const pad = (str, len) => String(str).padEnd(len, ' ');
        const divider = '─'.repeat(38);
        const lines = [
          `TEA ROUND SUMMARY`,
          `Shop: ${shop?.name || 'TeaRound'}`,
          `Date: ${dateStr}`,
          `Location: ${session.location || '—'}`,
          `Round ID: ${session.id}`,
          divider,
          ...agg.map(([name, qty]) => `${pad(name, 24)} ×${qty}`),
          divider,
          `Total Items: ${totalItems}`,
          `Total:       ₹${totalPrice.toFixed(2)}`,
          divider,
          `Individual Breakdown:`,
          ...Object.values(so.reduce((a, o) => {
            if (!a[o.userId]) a[o.userId] = { name: o.userName, items: [] };
            a[o.userId].items.push(`  • ${o.itemName} ×${o.quantity} (₹${(o.price * o.quantity).toFixed(2)})`);
            return a;
          }, {})).flatMap(u => [`${u.name}:`, ...u.items]),
        ];
        const text = lines.join('\n');
        const fileName = `TeaRound_${session.id}_${new Date().toISOString().slice(0, 10)}.txt`;

        // Method 1: Web Share API with file (best on mobile)
        if (navigator.share && navigator.canShare) {
          try {
            const file = new File([text], fileName, { type: 'text/plain' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: 'TeaRound Summary' });
              toast('Summary shared! ✅'); return;
            }
          } catch (e) { if (e.name === 'AbortError') return; }
        }

        // Method 2: Blob download
        try {
          const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = fileName;
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
          try { await navigator.clipboard.writeText(text); } catch (_) { }
          toast('Summary downloaded! ✅'); return;
        } catch (e) { console.warn('Blob download failed:', e); }

        // Method 3: data URI fallback
        const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
        const a = document.createElement('a'); a.href = dataUri; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        toast('Summary downloaded! ✅');
      } catch (err) { console.error('downloadSummary failed:', err); toast('Download failed', 'error'); }
    }

    // ─── RENDER: CREATE SESSION ───────────────────────────────────────────────────
    function renderCreateSession() {

    async function createSession() {

        const id = `ROUND-${gid()}`.toUpperCase();
        const session = { id, shopId, location: loc, creatorId: state.user.id, locked: false, closed: false };
        state.sessions.push(session);
        setState({ activeSessionId: id, view: 'session', _newSessionShop: '', _newSessionLoc: '' });
        toast('Round started! Share the code 🚀');
        const ok = await DB.upsertSession(session); // handles FK chain internally
        if (ok) { await DB.loadAll(); render(); }
      } catch (e) { console.error('createSession failed:', e); toast('Failed to create round', 'error'); }
    }

    </div>
  </div>
</div>`;

      return `
${renderTopbar(shop?.name || 'Round', 'home')}

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">

              <div class="card-sm" style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px">

                    <div class="tag tag-green" style="margin-bottom:2px">${o.userName}</div>

                  </div>
                </div>
                <div class="flex gap-10" style="flex-shrink:0">
                  <span class="font-bold text-muted" style="font-size:13px">₹${(o.price * o.quantity).toFixed(2)}</span>

              ? `<button class="btn-icon" style="color:var(--danger);width:32px;height:32px" onclick="removeOrder('${o.id}')">${svgIcon('trash', 14)}</button>` : ''}

              </div>`).join('')}

      ${!session.closed && !session.locked ? `
      <div>
        <div class="section-title">Place Order</div>
        <div class="section-sub">Select from ${shop?.name || 'menu'}</div>
        <div class="stack-8">
          ${!shop || !shop.menu || shop.menu.length === 0
            ? `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">This shop has no menu items.</div></div>`
            : shop.menu.map(item => `
              <div class="menu-item">
                <div class="menu-emoji">${item.emoji}</div>
                <div style="flex:1">
                  <div class="font-bold" style="font-size:14px;color:var(--text)">${item.name}</div>
                  <div class="text-accent font-bold text-sm">₹${item.price}</div>
                </div>
                <div class="flex gap-10">
                  <div class="qty-stepper">
                    <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
                    <span class="qty-num" id="qty-${item.id}">${qty[item.id] || 1}</span>

      ${billPanel}
    </div>
  </div>

    function toggleLock(id) {
      state.sessions = state.sessions.map(s => s.id === id ? { ...s, locked: !s.locked } : s);
      const updated = state.sessions.find(s => s.id === id);
      setState({}); toast(updated?.locked ? 'Round locked' : 'Round unlocked');
      DB.upsertSession(updated).then(async () => { await DB.loadAll(); render(); });
    }

    function closeRound(id) {
      confirmDelete('Close this round? Orders will be frozen.', () => {
        state.sessions = state.sessions.map(s => s.id === id ? { ...s, closed: true, locked: true } : s);
        const updated = state.sessions.find(s => s.id === id);
        setState({}); toast('Round closed');
        DB.upsertSession(updated).then(async () => { await DB.loadAll(); render(); });
      });
    }

    function removeOrder(id) {
      state.orders = state.orders.filter(o => o.id !== id);
      setState({}); toast('Order removed 🗑️');
      DB.deleteOrder(id).then(async () => { await DB.loadAll(); render(); });
    }

    function changeQty(itemId, delta) {
      const q = state._orderQty || {};
      q[itemId] = Math.max(1, (q[itemId] || 1) + delta);
      state._orderQty = q;
      const el = document.getElementById(`qty-${itemId}`);
      if (el) el.textContent = q[itemId];
    }

    async function addOrder(sessionId, itemId, itemName, price) {
      try {
        const qty = (state._orderQty || {})[itemId] || 1;
        const order = {
          id: gid(), sessionId, userId: state.user.id,
          userName: state.user.display_name || state.user.username,
          itemId, itemName, price: parseFloat(price) || 0, quantity: qty, note: ''
        };
        state.orders.push(order);
        const q = state._orderQty || {}; q[itemId] = 1; state._orderQty = q;
        setState({});
        const ok = await DB.upsertOrder(order); // handles full FK chain
        if (ok) {
          toast(`${itemName} ×${qty} added! ☕`);
          await DB.loadAll(); render();
        }
      } catch (e) { console.error('addOrder failed:', e); toast('Failed to add order', 'error'); }
    }

    // ─── RENDER: PROFILE ──────────────────────────────────────────────────────────
    function renderProfile() {
      const u = state.user;
      const userOrders = state.orders.filter(o => o.userId === u?.id);
      const totalSpent = userOrders.reduce((a, o) => a + o.price * o.quantity, 0);
      const stats = {
        totalOrders: userOrders.length,
        roundsHosted: state.sessions.filter(s => s.creatorId === u?.id).length,
        shopsCreated: state.shops.filter(s => s.creatorId === u?.id).length,
        totalSpent
      };
      const favItems = Object.entries(userOrders.reduce((a, o) => { a[o.itemName] = (a[o.itemName] || 0) + o.quantity; return a; }, {})).sort((a, b) => b[1] - a[1]).slice(0, 5);

      return `
${renderTopbar('Profile')}
<div id="content" style="max-width:600px">

  <!-- FIX: Single unified profile card (removed duplicate profile areas) -->

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:${state._editProfile ? '20px' : '0'}">

        ${avatarHtml(u, 72, 18)}
        <div class="avatar-upload-overlay">
          ${svgIcon('camera', 18)}
          <span style="font-size:10px;margin-top:2px">Edit</span>
        </div>
        <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="handleAvatarFile(this)"/>
      </div>
      ${!state._editProfile ? `
      <div style="flex:1;min-width:0">
        <div style="font-family:'Fraunces',serif;font-weight:900;font-size:22px;color:var(--text);line-height:1.2">${u.display_name || u.username}</div>
        <div class="flex gap-6" style="margin-top:6px;flex-wrap:wrap">
          <span class="tag ${u.role === 'admin' ? 'tag-green' : 'tag-muted'}">${u.role === 'admin' ? '👑 Admin' : '👤 Member'}</span>
          <span class="text-xs text-muted" style="line-height:1.8">Since ${u.joined || '?'}</span>
        </div>
        ${u.bio ? `<div class="text-muted" style="font-size:13px;margin-top:6px">${u.bio}</div>` : ''}
      </div>
      <button class="btn-icon" onclick="setState({_editProfile:true})" title="Edit profile">${svgIcon('edit', 16)}</button>
      ` : ''}
    </div>

    ${state._editProfile ? `
    <div class="stack-12">
      <div>
        <label class="form-label">Display Name</label>
        <input id="edit-username" class="inp" value="${(u.display_name || u.username).replace(/"/g, '&quot;')}" placeholder="Your name"/>
      </div>
      <div>
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input id="edit-pass" class="inp" type="${state._showEditPass ? 'text' : 'password'}" placeholder="New password" value="${(u.password || '').replace(/"/g, '&quot;')}" style="padding-right:44px"/>
          <button onclick="state._showEditPass=!state._showEditPass;render()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);display:flex">${svgIcon(state._showEditPass ? 'eye_off' : 'eye', 15)}</button>
        </div>
      </div>
      <div>
        <label class="form-label">Bio</label>
        <input id="edit-bio" class="inp" value="${(u.bio || '').replace(/"/g, '&quot;')}" placeholder="Short bio (optional)"/>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">${svgIcon('check', 16)} Save</button>
        <button class="btn btn-dark" style="flex:1" onclick="setState({_editProfile:false,_showEditPass:false})">${svgIcon('x', 16)} Cancel</button>
      </div>
    </div>` : ''}
  </div>

  <!-- Stats -->
  <div class="grid-3" style="margin-bottom:20px">
    ${[{ v: stats.totalOrders, l: 'Orders' }, { v: stats.roundsHosted, l: 'Hosted' }, { v: `₹${stats.totalSpent}`, l: 'Spent' }].map(i => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center">

        <div class="text-xs text-muted upper" style="margin-top:3px">${i.l}</div>
      </div>`).join('')}
  </div>

  ${favItems.length > 0 ? `
  <div class="card" style="padding:20px;margin-bottom:20px">
    <div class="section-title" style="margin-bottom:4px">Favourites</div>
    <div class="section-sub">Your most ordered items</div>
    <div class="stack-8">
      ${favItems.map(([name, count]) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
          <span class="font-bold" style="color:var(--text);font-size:14px">${name}</span>
          <span class="tag tag-green">×${count}</span>
        </div>`).join('')}
    </div>
  </div>` : ''}

  ${userOrders.length > 0 ? `
  <div class="card" style="padding:20px;margin-bottom:20px">

    <div class="stack-8">
      ${[...userOrders].reverse().slice(0, 10).map(o => {
        const sess = state.sessions.find(s => s.id === o.sessionId);
        const shop = state.shops.find(sh => sh.id === sess?.shopId);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
  <div>
    <div class="font-bold" style="font-size:13px;color:var(--text)">${o.itemName} <span class="text-muted">×${o.quantity}</span></div>
    <div class="text-xs text-muted">${shop?.name || 'Unknown'} · ${o.sessionId}</div>
  </div>
  <div class="font-black text-accent" style="font-size:14px">₹${(o.price * o.quantity).toFixed(2)}</div>
</div>`;
      }).join('')}
    </div>
  </div>` : ''}

  <!-- Theme -->
  <div class="card" style="padding:20px;margin-bottom:20px">
    <div class="section-title" style="margin-bottom:4px">Theme</div>
    <div class="section-sub">Choose your vibe</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
      ${Object.entries(THEMES).map(([key, t]) => `
        <div style="background:${t.surface};border:2px solid ${state.theme === key ? t.accent : t.border};border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .15s" onclick="setTheme('${key}')">
          <div style="font-size:18px;margin-bottom:4px">${THEME_EMOJIS[key] || '🎨'}</div>
          <div style="font-weight:800;font-size:11px;color:${t.text}">${t.name}</div>

  <div class="card" style="overflow:hidden;padding:0;margin-bottom:20px">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">

    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span class="font-bold" style="color:var(--text)">Member since</span>
      <span class="text-muted" style="font-size:13px">${u?.joined || '—'}</span>

      ${svgIcon('logout', 18)} Sign Out
    </button>
  </div>

</div>`;
    }

    function saveProfile() {
      try {
        const username = document.getElementById('edit-username')?.value?.trim();
        const bio = document.getElementById('edit-bio')?.value?.trim() || '';
        const pass = document.getElementById('edit-pass')?.value?.trim();
        if (!username) { toast('Name cannot be empty', 'error'); return; }
        if (!pass || pass.length < 3) { toast('Password must be at least 3 characters', 'error'); return; }
        if (state.users.find(u => (u.username || '').toLowerCase() === username.toLowerCase() && u.id !== state.user.id)) {
          toast('Username taken', 'error'); return;
        }
        // FIX: preserve display_name casing
        const patch = { username: username.toLowerCase(), display_name: username, bio, password: pass, theme: state.theme };
        updateUser(patch);
        DB.upsertUser({ ...state.user, ...patch });
        applyTheme(state.theme);
        setState({ _editProfile: false, _showEditPass: false });
        toast('Profile updated! ✅');
      } catch (e) { console.error('saveProfile failed:', e); toast('Failed to save profile', 'error'); }
    }

    function setTheme(name) {
      updateUser({ theme: name });
      DB.upsertUser({ ...state.user, theme: name });
      setState({ theme: name });
      applyTheme(name);
      toast(`Theme: ${THEMES[name].name}`);
    }

    <textarea id="import-json" class="inp" style="height:120px;resize:none;font-family:monospace;font-size:12px;display:block;width:100%;margin-bottom:16px" placeholder='{"name":"Café X","menu":[]}'></textarea>
    <div class="flex gap-10">
      <button class="btn btn-dark" style="flex:1" onclick="setState({modal:null})">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="importShop(document.getElementById('import-json').value)">Import</button>
    </div>
  </div>
</div>`;

      if (type === 'share') {
        const id = state.activeSessionId || '';
        return `<div class="modal-sheet" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-sheet-box">
    <div style="font-family:'Fraunces',serif;font-weight:900;font-size:24px;color:var(--text);margin-bottom:6px">Invite Teammates</div>
    <div class="text-muted text-sm" style="margin-bottom:24px">Share this code so colleagues can join the round</div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-family:'Fraunces',serif;font-weight:900;color:var(--accent);font-size:22px;letter-spacing:.08em">${id}</span>
      <button class="btn-icon" onclick="navigator.clipboard.writeText('${id}');toast('Code copied!')">${svgIcon('copy', 18)}</button>
    </div>
    <button class="btn btn-primary w-full" onclick="setState({modal:null})">Done</button>
  </div>
</div>`;
      }

      if (type === 'theme') return `<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-box" style="max-width:480px">
    <div style="font-family:'Fraunces',serif;font-weight:900;font-size:20px;color:var(--text);margin-bottom:6px">Choose Theme</div>
    <div class="text-muted text-sm" style="margin-bottom:18px">Pick your vibe</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      ${Object.entries(THEMES).map(([key, t]) => `
        <div class="theme-card ${state.theme === key ? 'active' : ''}" style="background:${t.surface};border:2px solid ${state.theme === key ? t.accent : t.border};cursor:pointer;padding:14px 12px" onclick="setTheme('${key}');setState({modal:null})">
          <div style="font-size:22px;margin-bottom:6px">${THEME_EMOJIS[key] || '🎨'}</div>
          <div style="font-weight:800;font-size:13px;color:${t.text}">${t.name}</div>
          <div style="display:flex;gap:4px;margin-top:6px">
            ${[t.accent, t.text, t['text2']].map(c => `<div style="width:10px;height:10px;border-radius:50%;background:${c}"></div>`).join('')}
          </div>
          ${state.theme === key ? `<div style="font-size:9px;font-weight:800;color:${t.accent};margin-top:4px;text-transform:uppercase;letter-spacing:.06em">Active</div>` : ''}
        </div>`).join('')}
    </div>
    <button class="btn btn-dark w-full" onclick="setState({modal:null})">Close</button>
  </div>
</div>`;

      if (type === 'confirm') return `<div class="modal-overlay">
  <div class="modal-box" style="text-align:center;max-width:360px">
    <div style="font-size:40px;margin-bottom:14px">⚠️</div>
    <div style="font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:var(--text);margin-bottom:8px">Confirm</div>
    <div class="text-muted text-sm" style="margin-bottom:22px">${data?.msg || ''}</div>
    <div class="flex gap-10">
      <button class="btn btn-dark" style="flex:1" onclick="setState({modal:null})">Cancel</button>
      <button class="btn btn-danger" style="flex:1" onclick="state._confirmCb&&state._confirmCb();setState({modal:null,_confirmCb:null})">Confirm</button>
    </div>
  </div>
</div>`;

      return '';
    }

    function confirmDelete(msg, cb) {
      state._confirmCb = cb;
      setState({ modal: { type: 'confirm', data: { msg } } });
    }

    // ─── INSTALL BANNER — FIX: shows only once, dismissed permanently ─────────────
    let deferredInstall = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredInstall = e;
      // Only show if not previously dismissed
      if (localStorage.getItem(SK.INSTALL_DISMISSED) !== '1') {
        const banner = document.getElementById('install-banner');
        if (banner) banner.classList.add('show');
      }
    });
    window.addEventListener('appinstalled', () => {
      deferredInstall = null;
      const banner = document.getElementById('install-banner');
      if (banner) banner.classList.remove('show');
      toast('App installed! 🎉');
    });

    async function installApp() {
      if (!deferredInstall) return;
      deferredInstall.prompt();
      const { outcome } = await deferredInstall.userChoice;
      deferredInstall = null;
      if (outcome === 'accepted') {
        const banner = document.getElementById('install-banner');
        if (banner) banner.classList.remove('show');
      }
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────────
    function render() {
      applyTheme(state.theme);
      const app = document.getElementById('app');

      if (!state.user) {
        app.innerHTML = renderLogin();
        const nameEl = document.getElementById('auth-name');
        const passEl = document.getElementById('auth-pass');
        if (nameEl) nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); passEl?.focus(); } });
        if (passEl) passEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitAuth(state._loginReg || false); } });
        return;
      }

      let pageHtml = '';
      const v = state.view;
      if (v === 'home') pageHtml = renderHome();
      else if (v === 'manage-shops') pageHtml = renderShops();
      else if (v === 'edit-menu') pageHtml = renderEditMenu();
      else if (v === 'create-session') pageHtml = renderCreateSession();
      else if (v === 'session') pageHtml = renderSession();
      else if (v === 'profile') pageHtml = renderProfile();

      // FIX: Install banner only shows if not dismissed
      const installDismissed = localStorage.getItem(SK.INSTALL_DISMISSED) === '1';
      const showBanner = deferredInstall && !installDismissed;

      app.innerHTML = `
<div id="install-banner" class="${showBanner ? 'show' : ''}">
  <span>☕ Install TeaRound for the best experience!</span>
  <button onclick="installApp()">Install</button>
  <button class="close-banner" onclick="localStorage.setItem('${SK.INSTALL_DISMISSED}','1');this.parentElement.classList.remove('show')">×</button>
</div>
${renderNav()}
<div id="main">${pageHtml}</div>
${renderModals()}`;

      // Event listeners
      document.getElementById('join-code')?.addEventListener('keydown', e => { if (e.key === 'Enter') quickJoin(); });
      document.getElementById('session-shop')?.addEventListener('change', function () {
        const shop = state.shops.find(s => s.id === this.value);
        state._newSessionShop = this.value;
        state._newSessionLoc = shop?.address || '';
        const locEl = document.getElementById('session-loc');
        if (locEl) locEl.value = state._newSessionLoc;
      });
    }

    // ─── AVATAR CROP SYSTEM ───────────────────────────────────────────────────────
    const _crop = { img: null, src: null, x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0, startImgX: 0, startImgY: 0, canvasW: 280, canvasH: 280 };

    function openAvatarPicker() {
      const inp = document.getElementById('avatar-file-input');
      if (inp) inp.click();
    }

    function handleAvatarFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        _crop.src = e.target.result;
        _crop.x = 0; _crop.y = 0; _crop.scale = 1;
        showCropModal();
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    function showCropModal() {
      const existing = document.getElementById('crop-modal');
      if (existing) existing.remove();
      const modal = document.createElement('div');
      modal.id = 'crop-modal';
      modal.className = 'crop-modal-overlay';
      modal.innerHTML = `<div class="crop-modal-box">
  <div style="font-family:'Fraunces',serif;font-weight:900;font-size:20px;color:var(--text);margin-bottom:6px">Edit Profile Photo</div>
  <div class="text-muted text-sm" style="margin-bottom:18px">Drag to reposition · Pinch or scroll to zoom</div>
  <div class="crop-canvas-wrap" id="crop-area">
    <img id="crop-img" src="${_crop.src}" draggable="false"/>
    <div class="crop-guide"></div>
  </div>
  <div style="margin-bottom:18px">
    <label class="form-label" style="margin-bottom:8px">Zoom</label>
    <input type="range" id="crop-zoom" min="0.3" max="3" step="0.01" value="1"
      style="width:100%;accent-color:var(--accent)"
      oninput="setCropScale(parseFloat(this.value))"/>
  </div>
  <div class="flex gap-10">
    <button class="btn btn-dark" style="flex:1" onclick="closeCropModal()">Cancel</button>
    <button class="btn btn-danger btn-sm" style="padding:0 14px" onclick="removeAvatar()">Remove Photo</button>
    <button class="btn btn-primary" style="flex:1" onclick="cropAndSave()">✓ Save</button>
  </div>
</div>`;
      document.body.appendChild(modal);
      const img = document.getElementById('crop-img');
      img.onload = () => {
        _crop.img = img;
        const fitScale = Math.max(_crop.canvasW / img.naturalWidth, _crop.canvasH / img.naturalHeight);
        _crop.scale = fitScale;
        _crop.x = (_crop.canvasW - img.naturalWidth * fitScale) / 2;
        _crop.y = (_crop.canvasH - img.naturalHeight * fitScale) / 2;
        document.getElementById('crop-zoom').value = fitScale;
        document.getElementById('crop-zoom').min = Math.max(0.1, fitScale * 0.5);
        applyCropTransform();
        attachCropEvents();
      };
      if (img.complete) img.onload();
    }

    function applyCropTransform() {
      const img = document.getElementById('crop-img');
      if (!img || !_crop.img) return;
      img.style.width = (_crop.img.naturalWidth * _crop.scale) + 'px';
      img.style.height = (_crop.img.naturalHeight * _crop.scale) + 'px';
      img.style.left = _crop.x + 'px';
      img.style.top = _crop.y + 'px';
    }

    function setCropScale(newScale) {
      if (!_crop.img) return;
      const cx = _crop.canvasW / 2, cy = _crop.canvasH / 2;
      const ratio = newScale / _crop.scale;
      _crop.x = cx - (cx - _crop.x) * ratio;
      _crop.y = cy - (cy - _crop.y) * ratio;
      _crop.scale = newScale;
      applyCropTransform();
    }

    function attachCropEvents() {
      const area = document.getElementById('crop-area');
      if (!area) return;
      area.addEventListener('mousedown', e => {
        _crop.dragging = true; _crop.startX = e.clientX; _crop.startY = e.clientY;
        _crop.startImgX = _crop.x; _crop.startImgY = _crop.y; e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!_crop.dragging) return;
        _crop.x = _crop.startImgX + (e.clientX - _crop.startX);
        _crop.y = _crop.startImgY + (e.clientY - _crop.startY);
        applyCropTransform();
      });
      window.addEventListener('mouseup', () => { _crop.dragging = false; });
      let lastTouchDist = null;
      area.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
          _crop.dragging = true; _crop.startX = e.touches[0].clientX; _crop.startY = e.touches[0].clientY;
          _crop.startImgX = _crop.x; _crop.startImgY = _crop.y;
        } else if (e.touches.length === 2) {
          lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        e.preventDefault();
      }, { passive: false });
      area.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && _crop.dragging) {
          _crop.x = _crop.startImgX + (e.touches[0].clientX - _crop.startX);
          _crop.y = _crop.startImgY + (e.touches[0].clientY - _crop.startY);
          applyCropTransform();
        } else if (e.touches.length === 2 && lastTouchDist !== null) {
          const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          const newScale = Math.min(3, Math.max(0.1, _crop.scale * (dist / lastTouchDist)));
          setCropScale(newScale);
          document.getElementById('crop-zoom').value = newScale;
          lastTouchDist = dist;
        }
        e.preventDefault();
      }, { passive: false });
      area.addEventListener('touchend', e => {
        if (e.touches.length < 2) lastTouchDist = null;
        if (e.touches.length === 0) _crop.dragging = false;
      });
      area.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        const newScale = Math.min(3, Math.max(0.1, _crop.scale + delta));
        setCropScale(newScale);
        document.getElementById('crop-zoom').value = newScale;
      }, { passive: false });
    }

    function closeCropModal() {
      const m = document.getElementById('crop-modal');
      if (m) m.remove();
    }

    function removeAvatar() {
      const patch = { avatarUrl: null };
      updateUser(patch);
      DB.upsertUser({ ...state.user, ...patch });
      setState({ _editProfile: false });
      closeCropModal();
      toast('Profile photo removed');
    }

    function cropAndSave() {
      if (!_crop.img || !_crop.src) return;
      try {
        const SIZE = 256;
        const canvas = document.createElement('canvas');
        canvas.width = SIZE; canvas.height = SIZE;
        const ctx = canvas.getContext('2d');
        const scaleToOutput = SIZE / _crop.canvasW;
        ctx.drawImage(_crop.img, _crop.x * scaleToOutput, _crop.y * scaleToOutput,
          _crop.img.naturalWidth * _crop.scale * scaleToOutput, _crop.img.naturalHeight * _crop.scale * scaleToOutput);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        const patch = { avatarUrl: dataUrl };
        updateUser(patch);
        DB.upsertUser({ ...state.user, ...patch }); // FIX: saves avatar to DB
        setState({});
        closeCropModal();
        toast('Profile photo saved! 📸');
      } catch (e) { console.error('Crop failed:', e); toast('Failed to save photo', 'error'); }
    }

    // ─── BOOT ─────────────────────────────────────────────────────────────────────
    load();

    // PWA manifest injection
    (function injectManifest() {
      try {
        const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#00c896"/><text x="256" y="340" text-anchor="middle" font-size="300" fill="#0a0a14">☕</text></svg>`;
        const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
        const manifest = { name: 'TeaRound Pro', short_name: 'TeaRound', description: 'Effortless group tea & coffee orders', start_url: './', scope: './', display: 'standalone', background_color: '#0d0d14', theme_color: '#00c896', icons: [{ src: iconUrl, sizes: '192x192', type: 'image/svg+xml' }, { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }] };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const url = URL.createObjectURL(blob);
        const existing = document.querySelector('link[rel="manifest"]');
        if (existing) existing.href = url;
      } catch (e) { console.warn('Manifest inject failed', e); }
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { });
    }
  </script>
</body>

</html>
